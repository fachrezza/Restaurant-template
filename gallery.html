<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Gallery | Garden Cafe</title>

    <link rel="icon" href="favicon.ico">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>

        tailwind.config = {

            theme: {

                extend: {

                    colors: {

                        primary: "#3B2F2F",
                        secondary: "#C49B66",
                        light: "#FFF8F0",
                        dark: "#1B1B1B"

                    }

                }

            }

        }

    </script>

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="assets/css/style.css">

</head>

<body class="font-[Poppins] bg-light">

    <!-- ========================= -->
    <!-- Navbar -->
    <!-- ========================= -->

    <header id="navbar"
        class="fixed top-0 left-0 w-full z-50">

        <div class="max-w-7xl mx-auto px-6">

            <div class="flex justify-between items-center h-20">

                <a href="index.html"
                    class="text-3xl font-bold text-white">

                    Garden Cafe

                </a>

                <nav class="hidden lg:flex gap-10 text-white">

                    <a href="index.html">Home</a>

                    <a href="about.html">About</a>

                    <a href="menu.html">Menu</a>

                    <a href="gallery.html"
                        class="text-secondary">

                        Gallery

                    </a>

                    <a href="reservation.html">

                        Reservation

                    </a>

                    <a href="contact.html">

                        Contact

                    </a>

                </nav>

                <a href="reservation.html"
                    class="hidden lg:block bg-secondary px-6 py-3 rounded-full text-white">

                    Book Table

                </a>

            </div>

        </div>

    </header>

    <!-- ========================= -->
    <!-- Hero -->
    <!-- ========================= -->

    <section class="relative h-[60vh]">

        <img
            src="assets/images/hero.jpg"
            class="absolute inset-0 w-full h-full object-cover">

        <div class="absolute inset-0 bg-black/60"></div>

        <div class="relative h-full flex items-center">

            <div class="max-w-7xl mx-auto px-6">

                <span
                    class="uppercase tracking-[5px] text-secondary">

                    Gallery

                </span>

                <h1
                    class="text-6xl font-bold text-white mt-5">

                    Discover

                    Our Moments

                </h1>

                <p
                    class="text-gray-300 mt-6 max-w-2xl leading-8">

                    Every cup of coffee,
                    every delicious meal,
                    and every smile creates
                    unforgettable memories.

                </p>

            </div>

        </div>

    </section>

    <!-- ========================= -->
    <!-- Gallery Filter -->
    <!-- ========================= -->

    <section class="py-20 bg-white">

        <div class="max-w-7xl mx-auto px-6">

            <div
                class="flex flex-wrap justify-center gap-5">

                <button
                    class="gallery-filter bg-primary text-white px-6 py-3 rounded-full"
                    data-filter="all">

                    All

                </button>

                <button
                    class="gallery-filter border px-6 py-3 rounded-full"
                    data-filter="food">

                    Food

                </button>

                <button
                    class="gallery-filter border px-6 py-3 rounded-full"
                    data-filter="coffee">

                    Coffee

                </button>

                <button
                    class="gallery-filter border px-6 py-3 rounded-full"
                    data-filter="dessert">

                    Dessert

                </button>

                <button
                    class="gallery-filter border px-6 py-3 rounded-full"
                    data-filter="interior">

                    Interior

                </button>

            </div>

        </div>

    </section>

    <!-- ========================= -->
    <!-- Gallery Grid -->
    <!-- ========================= -->

    <section class="pb-24">

        <div class="max-w-7xl mx-auto px-6">

            <div
                id="galleryContainer"
                class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">

                <!-- Item -->

                <div
                    class="gallery-item group relative overflow-hidden rounded-3xl"
                    data-category="food">

                    <img
                        src="assets/images/gallery/1.jpg"
                        class="w-full h-96 object-cover duration-500 group-hover:scale-110">

                    <div
                        class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 duration-300 flex items-end">

                        <div class="p-8">

                            <h3 class="text-white text-3xl font-bold">

                                Premium Steak

                            </h3>

                            <p class="text-gray-300 mt-3">

                                Signature Menu

                            </p>

                        </div>

                    </div>

                </div>

                <!-- Item -->

                <div
                    class="gallery-item group relative overflow-hidden rounded-3xl"
                    data-category="coffee">

                    <img
                        src="assets/images/gallery/2.jpg"
                        class="w-full h-[500px] object-cover duration-500 group-hover:scale-110">

                    <div
                        class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 duration-300 flex items-end">

                        <div class="p-8">

                            <h3
                                class="text-white text-3xl font-bold">

                                Signature Latte

                            </h3>

                            <p
                                class="text-gray-300 mt-3">

                                Fresh Coffee

                            </p>

                        </div>

                    </div>

                </div>

                <!-- Item -->

                <div
                    class="gallery-item group relative overflow-hidden rounded-3xl"
                    data-category="interior">

                    <img
                        src="assets/images/gallery/3.jpg"
                        class="w-full h-80 object-cover duration-500 group-hover:scale-110">

                    <div
                        class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 duration-300 flex items-end">

                        <div class="p-8">

                            <h3
                                class="text-white text-3xl font-bold">

                                Cozy Interior

                            </h3>

                            <p
                                class="text-gray-300 mt-3">

                                Comfortable Place

                            </p>

                        </div>

                    </div>

                </div>
