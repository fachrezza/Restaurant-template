<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Menu | Garden Cafe</title>

    <link rel="icon" href="favicon.ico">

    <!-- Tailwind -->

    <script src="https://cdn.tailwindcss.com"></script>

    <script>

        tailwind.config = {

            theme: {

                extend: {

                    colors: {

                        primary: "#3B2F2F",

                        secondary: "#C49B66",

                        light: "#FFF8F0",

                        dark: "#1B1B1B"

                    }

                }

            }

        }

    </script>

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="assets/css/style.css">

</head>

<body class="font-[Poppins] bg-light">

    <!-- ================================= -->
    <!-- Navbar -->
    <!-- ================================= -->

    <header
        id="navbar"
        class="fixed top-0 left-0 w-full z-50">

        <div class="max-w-7xl mx-auto px-6">

            <div
                class="flex justify-between items-center h-20">

                <a href="index.html"
                    class="text-3xl font-bold text-white">

                    Garden Cafe

                </a>

                <nav
                    class="hidden lg:flex gap-10 text-white">

                    <a href="index.html">

                        Home

                    </a>

                    <a href="about.html">

                        About

                    </a>

                    <a href="menu.html"
                        class="text-secondary">

                        Menu

                    </a>

                    <a href="gallery.html">

                        Gallery

                    </a>

                    <a href="reservation.html">

                        Reservation

                    </a>

                    <a href="contact.html">

                        Contact

                    </a>

                </nav>

                <a href="reservation.html"
                    class="hidden lg:block bg-secondary text-white px-6 py-3 rounded-full">

                    Book Table

                </a>

            </div>

        </div>

    </header>

    <!-- ================================= -->
    <!-- Hero -->
    <!-- ================================= -->

    <section
        class="relative h-[60vh]">

        <img
            src="assets/images/hero.jpg"
            class="absolute inset-0 w-full h-full object-cover">

        <div
            class="absolute inset-0 bg-black/60">

        </div>

        <div
            class="relative h-full flex items-center">

            <div
                class="max-w-7xl mx-auto px-6">

                <span
                    class="uppercase tracking-[5px] text-secondary">

                    Our Menu

                </span>

                <h1
                    class="text-6xl font-bold text-white mt-5">

                    Discover

                    Our Signature

                    Dishes

                </h1>

                <p
                    class="text-gray-300 mt-6 max-w-2xl leading-8">

                    Crafted with fresh ingredients,

                    premium coffee beans,

                    and passion in every bite.

                </p>

            </div>

        </div>

    </section>

    <!-- ================================= -->
    <!-- Search -->
    <!-- ================================= -->

    <section
        class="py-16 bg-white">

        <div
            class="max-w-7xl mx-auto px-6">

            <div
                class="flex flex-col lg:flex-row gap-6 justify-between">

                <input

                    id="searchMenu"

                    type="text"

                    placeholder="Search menu..."

                    class="border rounded-full px-6 py-4 flex-1 outline-none">

                <div
                    class="flex flex-wrap gap-4">

                    <button
                        class="filter-btn bg-primary text-white px-6 py-3 rounded-full"
                        data-filter="all">

                        All

                    </button>

                    <button
                        class="filter-btn border px-6 py-3 rounded-full"
                        data-filter="coffee">

                        Coffee

                    </button>

                    <button
                        class="filter-btn border px-6 py-3 rounded-full"
                        data-filter="food">

                        Food

                    </button>

                    <button
                        class="filter-btn border px-6 py-3 rounded-full"
                        data-filter="dessert">

                        Dessert

                    </button>

                    <button
                        class="filter-btn border px-6 py-3 rounded-full"
                        data-filter="drink">

                        Drink

                    </button>

                </div>

            </div>

        </div>

    </section>

    <!-- ================================= -->
    <!-- Menu -->
    <!-- ================================= -->

    <section
        class="pb-24">

        <div
            class="max-w-7xl mx-auto px-6">

            <div
                id="menuContainer"
                class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">

                <!-- ===================== -->
                <!-- Card 1 -->
                <!-- ===================== -->

                <div
                    class="menu-item bg-white rounded-3xl overflow-hidden shadow-lg"
                    data-category="coffee">

                    <div class="relative">

                        <img

                            src="assets/images/coffee/coffee1.jpg"

                            class="w-full h-72 object-cover">

                        <span
                            class="absolute top-5 left-5 bg-secondary text-white px-4 py-2 rounded-full">

                            Best Seller

                        </span>

                    </div>

                    <div class="p-6">

                        <h3
                            class="text-2xl font-semibold">

                            Signature Latte

                        </h3>

                        <p
                            class="text-gray-500 mt-4">

                            Espresso with creamy milk.

                        </p>

                        <div
                            class="flex justify-between items-center mt-6">

                            <span
                                class="text-secondary text-2xl font-bold">

                                Rp42K

                            </span>

                            <button
                                class="bg-primary text-white px-5 py-2 rounded-full">

                                Order

                            </button>

                        </div>

                    </div>

                </div>

                <!-- ===================== -->
                <!-- Card 2 -->
                <!-- ===================== -->

                <div
                    class="menu-item bg-white rounded-3xl overflow-hidden shadow-lg"
                    data-category="food">

                    <img

                        src="assets/images/food/food1.jpg"

                        class="w-full h-72 object-cover">

                    <div class="p-6">

                        <h3 class="text-2xl font-semibold">

                            Creamy Pasta

                        </h3>

                        <p class="text-gray-500 mt-4">

                            Parmesan cream sauce.

                        </p>

                        <div
                            class="flex justify-between items-center mt-6">

                            <span
                                class="text-secondary text-2xl font-bold">

                                Rp68K

                            </span>

                            <button
                                class="bg-primary text-white px-5 py-2 rounded-full">

                                Order

                            </button>

                        </div>

                    </div>

                </div>
